[alembic]
# path to migration scripts
directory = migrations

# version location
target_metadata = myapp.models.Base.metadata


# database URL
db_url = postgresql+asyncpg://user:password@localhost:5432/taskmaster_pro

# Logging levels
log_level = INFO


[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
propagate = 0

[logger_alembic]
level = INFO
handlers =
qualname = alembic
propagate = 0

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s