version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: taskmaster
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskmaster
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "taskmaster"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  user-service:
    build:
      context: ./
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  task-service:
    build:
      context: ./
      dockerfile: docker/Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  category-service:
    build:
      context: ./
      dockerfile: docker/Dockerfile
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"